<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Local multimodal Character AI clone — chat with custom AI personas powered by Ollama." />
  <title>Character AI — Local Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ====================================================================
       Design System — Tokens
       ==================================================================== */
    :root {
      /* Surface palette — deep dark with purple/blue accent */
      --bg-base:       #0b0d14;
      --bg-surface:    #12151f;
      --bg-elevated:   #1a1e2e;
      --bg-hover:      #232840;
      --bg-input:      #161a28;

      /* Accent gradient */
      --accent-start:  #7c5cfc;
      --accent-end:    #38bdf8;
      --accent:        linear-gradient(135deg, var(--accent-start), var(--accent-end));

      /* Text */
      --text-primary:  #e8eaf0;
      --text-secondary:#8b90a5;
      --text-muted:    #555a72;

      /* Borders */
      --border:        rgba(255, 255, 255, 0.06);
      --border-active: rgba(124, 92, 252, 0.4);

      /* Misc */
      --radius:        12px;
      --radius-sm:     8px;
      --shadow:        0 8px 32px rgba(0, 0, 0, 0.45);
      --transition:    0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --font:          'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

      /* Chat bubbles */
      --bubble-user:   linear-gradient(135deg, #7c5cfc 0%, #5b3fd4 100%);
      --bubble-ai:     #1a1e2e;
    }

    /* ====================================================================
       Reset & Base
       ==================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    button { cursor: pointer; font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

    /* ====================================================================
       Layout — Sidebar + Main
       ==================================================================== */
    #app-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Sidebar ---- */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 24px;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* Form controls */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--border-active); }
    .form-input::placeholder { color: var(--text-muted); }

    textarea.form-input { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      border: none;
      transition: all var(--transition);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* Character list */
    #character-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
    }

    .character-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid transparent;
    }
    .character-chip:hover { background: var(--bg-hover); color: var(--text-primary); }
    .character-chip.active {
      background: var(--bg-hover);
      border-color: var(--border-active);
      color: var(--text-primary);
    }

    .character-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    /* Reset button */
    .sidebar-footer { margin-top: auto; padding-top: 16px; }

    /* ---- Main Area ---- */
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Top bar */
    #top-bar {
      height: 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    #active-character-name {
      font-size: 15px;
      font-weight: 600;
    }

    #active-character-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(124, 92, 252, 0.15);
      color: var(--accent-start);
      font-weight: 600;
    }

    /* Chat area */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.3; }
    .empty-state p { font-size: 14px; max-width: 320px; line-height: 1.6; }

    /* Message bubbles */
    .msg {
      max-width: 680px;
      display: flex;
      gap: 12px;
      animation: fadeSlideIn 0.35s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .msg.assistant .msg-bubble {
      background: var(--bubble-ai);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .msg-speaker {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-start);
      margin-bottom: 4px;
    }

    /* Image action tag */
    .img-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(124, 92, 252, 0.12);
      color: var(--accent-start);
      padding: 2px 8px;
      border-radius: 4px;
      font-style: italic;
      font-size: 13px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ---- Input bar ---- */
    #input-bar {
      padding: 16px 28px 24px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 18px;
      transition: border-color var(--transition);
    }
    #input-wrapper:focus-within { border-color: var(--border-active); }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      padding: 8px 0;
    }
    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.88; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    #send-btn svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Status toast */
    #status-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow);
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }
    #status-toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ====================================================================
       Responsive
       ==================================================================== */
    @media (max-width: 768px) {
      #sidebar { width: 240px; min-width: 240px; padding: 16px 14px; }
      #chat-window { padding: 16px; }
      #input-bar { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>

<div id="app-layout">
  <!-- ================= SIDEBAR ================= -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <span>CharacterAI</span>
    </div>

    <!-- Add Character -->
    <div>
      <div class="sidebar-section-title">Add Character</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="form-group">
          <label for="char-name">Name</label>
          <input id="char-name" class="form-input" type="text" placeholder="e.g. Luna" />
        </div>
        <div class="form-group">
          <label for="char-desc">System Prompt</label>
          <textarea id="char-desc" class="form-input" placeholder="Describe the character's personality, background, speech style…"></textarea>
        </div>
        <button id="add-char-btn" class="btn btn-primary" onclick="addCharacter()">
          ＋ Add Character
        </button>
      </div>
    </div>

    <!-- Character List -->
    <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <div class="sidebar-section-title">Characters</div>
      <div id="character-list">
        <div class="empty-state" style="padding:24px 0;">
          <p style="font-size:12px;">No characters yet.<br/>Add one above to start chatting.</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%;" onclick="resetSession()">
        🔄 Reset Session
      </button>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main id="main-area">
    <!-- Top bar -->
    <header id="top-bar">
      <span id="active-character-name">Select a character</span>
      <span id="active-character-badge" style="display:none;">active</span>
    </header>

    <!-- Chat messages -->
    <div id="chat-window">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <p>Add a character from the sidebar and start a conversation. Your messages and AI responses will appear here.</p>
      </div>
    </div>

    <!-- Input bar -->
    <div id="input-bar">
      <div id="input-wrapper">
        <input id="msg-input" type="text" placeholder="Type a message…" autocomplete="off" onkeydown="if(event.key==='Enter')sendMessage()" />
        <button id="send-btn" onclick="sendMessage()" disabled title="Send message">
          <svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Status toast -->
<div id="status-toast"></div>

<script>
// =====================================================================
// State
// =====================================================================
const API = '';  // Same origin — served by FastAPI
let activeCharacter = null;

// Palette for character avatars
const AVATAR_COLORS = [
  '#7c5cfc', '#e0547a', '#38bdf8', '#f59e42', '#22c55e',
  '#d946ef', '#f43f5e', '#06b6d4', '#a3e635', '#f472b6',
];
let colorIndex = 0;
const charColors = {};

function getCharColor(name) {
  if (!charColors[name]) {
    charColors[name] = AVATAR_COLORS[colorIndex % AVATAR_COLORS.length];
    colorIndex++;
  }
  return charColors[name];
}

// =====================================================================
// Toast helper
// =====================================================================
function showToast(msg, ms = 2500) {
  const el = document.getElementById('status-toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), ms);
}

// =====================================================================
// Add Character
// =====================================================================
async function addCharacter() {
  const nameEl = document.getElementById('char-name');
  const descEl = document.getElementById('char-desc');
  const name = nameEl.value.trim();
  const desc = descEl.value.trim();
  if (!name)  return showToast('⚠️ Character name is required.');
  if (!desc)  return showToast('⚠️ Please provide a system prompt.');

  try {
    const res = await fetch(`${API}/add_character`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);

    nameEl.value = '';
    descEl.value = '';
    showToast(`✅ ${name} added!`);
    refreshCharacterList();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

// =====================================================================
// Character List
// =====================================================================
async function refreshCharacterList() {
  try {
    const res = await fetch(`${API}/characters`);
    const data = await res.json();
    const list = document.getElementById('character-list');

    if (data.characters.length === 0) {
      list.innerHTML = `<div class="empty-state" style="padding:24px 0;"><p style="font-size:12px;">No characters yet.<br/>Add one above to start chatting.</p></div>`;
      return;
    }

    list.innerHTML = data.characters.map(name => {
      const color = getCharColor(name);
      const initial = name.charAt(0).toUpperCase();
      const isActive = name === activeCharacter;
      return `
        <div class="character-chip ${isActive ? 'active' : ''}" onclick="selectCharacter('${name.replace(/'/g, "\\'")}')">
          <div class="character-avatar" style="background:${color};">${initial}</div>
          <span>${name}</span>
        </div>`;
    }).join('');

  } catch (err) {
    console.error('Failed to fetch characters', err);
  }
}

function selectCharacter(name) {
  activeCharacter = name;
  document.getElementById('active-character-name').textContent = name;
  document.getElementById('active-character-badge').style.display = 'inline';
  document.getElementById('send-btn').disabled = false;
  refreshCharacterList();
}

// =====================================================================
// Chat
// =====================================================================

/**
 * Render cleaned_text replacing [LOCAL_IMG:/static/filename.png] tags with HTML <img> tags.
 */
function renderText(text) {
  // Replace successful local images
  let rendered = text.replace(/\[LOCAL_IMG:(.+?)\]/g, '<img src="$1" style="max-width: 100%; border-radius: 12px; margin-top: 12px; display: block;" />');
  // Also handle the fallback string for failed generations
  rendered = rendered.replace(/\*shares an image \(failed to load\)\*/g, '<span class="img-action">⚠️ Failed to generate image</span>');
  return rendered;
}

function appendMessage(role, text, speaker = null) {
  const win = document.getElementById('chat-window');
  // Remove empty state if present
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'user') {
    div.innerHTML = `
      <div class="msg-avatar" style="background:#555a72;">U</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>`;
  } else {
    const color = getCharColor(speaker || 'AI');
    const initial = (speaker || 'A').charAt(0).toUpperCase();
    div.innerHTML = `
      <div class="msg-avatar" style="background:${color};">${initial}</div>
      <div class="msg-bubble">
        <div class="msg-speaker">${escapeHtml(speaker || 'AI')}</div>
        ${renderText(escapeHtml(text))}
      </div>`;
  }

  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function showTyping(speaker) {
  const win = document.getElementById('chat-window');
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-msg';
  const color = getCharColor(speaker || 'AI');
  const initial = (speaker || 'A').charAt(0).toUpperCase();
  div.innerHTML = `
    <div class="msg-avatar" style="background:${color};">${initial}</div>
    <div class="msg-bubble">
      <div class="msg-speaker">${escapeHtml(speaker)}</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function sendMessage() {
  if (!activeCharacter) return showToast('⚠️ Select a character first.');
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  appendMessage('user', text);
  showTyping(activeCharacter);
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ character_name: activeCharacter, user_message: text }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }

    const data = await res.json();
    appendMessage('assistant', data.text, data.character);

  } catch (err) {
    removeTyping();
    showToast(`❌ ${err.message}`);
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

// =====================================================================
// Reset
// =====================================================================
async function resetSession() {
  if (!confirm('Reset all characters and history?')) return;
  try {
    await fetch(`${API}/reset`, { method: 'POST' });
    activeCharacter = null;
    document.getElementById('active-character-name').textContent = 'Select a character';
    document.getElementById('active-character-badge').style.display = 'none';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('chat-window').innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <p>Add a character from the sidebar and start a conversation. Your messages and AI responses will appear here.</p>
      </div>`;
    refreshCharacterList();
    showToast('🔄 Session reset.');
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

// =====================================================================
// Utility
// =====================================================================
function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

// Init
refreshCharacterList();
</script>

</body>
</html>
